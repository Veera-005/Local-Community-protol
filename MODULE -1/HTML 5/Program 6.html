<!DOCTYPE html>
<html>
<body>
Phone:
<input type="text"
id="phone"
onblur="checkPhone()">
<br><br>
<select onchange="showFee()"
id="event">
<option>Select</option>
<option>Music</option>
<option>Sports</option>
</select>
<p id="fee"></p>
<textarea
id="feedback"
onkeyup="countChar()">
</textarea>
<p id="count">0</p>
<button onclick="submitData()">
Submit
</button>
<img src="event1.jpg"
width="200"
ondblclick="enlarge(this)">
<script>
function checkPhone(){
alert("Phone validated");
}
function showFee(){
document.getElementById("fee").innerHTML=
"Fee: ₹500";
}
function submitData(){
alert("Submitted");
}
function enlarge(x){
x.style.width="400px";
}
function countChar(){
let x=
document.getElementById("feedback").value.length;
document.getElementById("count").innerHTML=x;
}
</script>
</body>
</html>
