<!DOCTYPE html>
<html>
<body>
<select id="event">
<option>Music</option>
<option>Sports</option>
</select>
<button onclick="saveData()">
Save
</button>
<button onclick="clearData()">
Clear Preferences
</button>
<script>
function saveData(){
let x=
document.getElementById("event").value;
localStorage.setItem("event",x);
}
window.onload=function(){
document.getElementById("event").value=
localStorage.getItem("event");
}
function clearData(){
localStorage.clear();
sessionStorage.clear();
}
</script>
</body>
</html>
